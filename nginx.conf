server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve React App routing (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API Requests to Evolution (Mimicking Vite dev-server config)
    location /evolution/ {
        # IMPORTANTE: host.docker.internal causa erro no Linux/EasyPanel pois o DNS não resolve na inicialização.
        # Use o IP do Gateway do Docker (172.17.0.1) ou o IP Público/Nome do Serviço da sua VPS.
        proxy_pass http://172.17.0.1:8080/;
        
        # Rewrite the path (strip /evolution from the URL before sending)
        # e.g., /evolution/instance/connect -> /instance/connect
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
